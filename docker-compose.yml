services:

  # ── Signal REST API ──────────────────────────────────────────────────────────
  signal-api:
    # Pinned by digest. To update: `docker pull bbernhard/signal-cli-rest-api:0.99`
    # then `docker inspect --format='{{index .RepoDigests 0}}' bbernhard/signal-cli-rest-api:0.99`
    image: bbernhard/signal-cli-rest-api:0.99@sha256:419d08b18db00ecabd30386765662330fda85bdacc7c302f0cd541244895aeb5
    container_name: signal-api
    restart: unless-stopped
    environment:
      - MODE=json-rpc
    # ⚠️  No 'ports:' mapping — the API is internal only.
    # The bot reaches it via Docker's internal network (http://signal-api:8080).
    #
    # For initial setup (register / verify), temporarily uncomment this,
    # then remove it again once registration is complete:
    #
    # ports:
    #  - "127.0.0.1:8080:8080"   # loopback only — never 0.0.0.0
    volumes:
      - ./signal-config:/home/.local/share/signal-cli
    networks:
      - internal
    # ── Container hardening ──────────────────────────────────────────────────
    # The image's entrypoint runs root-side setup (usermod, chown), then
    # drops to UID 1000 via setpriv. That privilege-drop needs SETUID and
    # SETGID; CHOWN is needed for the chown of the data volume on Linux.
    # All three are used during ~1s of startup, after which signal-cli-rest-api
    # runs as UID 1000 with no caps at all (setpriv strips inheritables).
    # Net steady-state: same as cap_drop ALL.
    # read_only is omitted — entrypoint writes /etc/group during usermod sync.
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Bot ───────────────────────────────────────────────────────────────────────
  bot:
    build: .
    image: signal-bot:local
    container_name: signal-bot
    restart: unless-stopped
    depends_on:
      - signal-api
    environment:
      - SIGNAL_SERVICE=http://signal-api:8080
      - OWNER_ID=${OWNER_ID}
      - BOT_UUID=${BOT_UUID}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - MODEL_EDIT=${MODEL_EDIT:-llama3.3}
      - MODEL_SEARCH=${MODEL_SEARCH:-llama3.3}
      - SEARCH_FALLBACK=${SEARCH_FALLBACK-auto}
      - DOC_DIR=/data/docs
      - PERSONA_PATH=/data/persona.md
      - GROUPS_FILE=/data/groups.txt
      - GROUP_ADMINS_FILE=/data/group_admins.json
      - MAX_QUERY_CHARS=${MAX_QUERY_CHARS-1000}
      - MAX_DOC_CHARS=${MAX_DOC_CHARS-50000}
      - MAX_DOC_INPUT_CHARS=${MAX_DOC_INPUT_CHARS-20000}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS-3000}
      - LLM_LARGE_MAX_TOKENS=${LLM_LARGE_MAX_TOKENS-10000}
      - LLM_TIMEOUT=${LLM_TIMEOUT-180}
      - PROGRESS_NUDGE_SECONDS=${PROGRESS_NUDGE_SECONDS-30}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX-10}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW-60}
    secrets:
      - bot_number
    volumes:
      - ./data:/data
    networks:
      - internal
    # ── Container hardening ──────────────────────────────────────────────────
    read_only: true                # immutable rootfs; volumes still writable
    tmpfs:
      - /tmp                       # Python / requests scratch space
    cap_drop:
      - ALL                        # bot needs no Linux capabilities
    security_opt:
      - no-new-privileges:true     # block setuid privilege escalation
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

secrets:
  bot_number:
    file: ./secrets/bot_number.txt

networks:
  internal:
    driver: bridge
